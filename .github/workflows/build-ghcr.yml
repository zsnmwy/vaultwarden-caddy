name: Build Vaultwarden Caddy Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: true
        default: '7'
  schedule:
    - cron: '0 3 1 * *'

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_OWNER: zsnmwy
      IMAGE_NAME: vaultwarden-caddy-cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${IMAGE_OWNER}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA::7}"
          month_tag="$(date -u +'%Y%m')"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version_tag="${{ inputs.image_tag }}"
          else
            version_tag="${month_tag}"
          fi

          {
            echo "image=${image}"
            echo "short_sha=${short_sha}"
            echo "month_tag=${month_tag}"
            echo "version_tag=${version_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.prep.outputs.image }}:latest
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.version_tag }}
            ${{ steps.prep.outputs.image }}:sha-${{ steps.prep.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
